<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovine Lab - Factors and Multiples</title>
    <style>
        :root {
            --primary: #8e44ad;
            --accent: #9b59b6;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #f4f7f6;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 1) Innovine logo screen at start for 5 seconds.. nothing else */
        #brand-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #brand-screen img { 
            width: 80%;
            max-width: 250px; 
            height: auto;
        }

        /* 3) Playable on all screen type laptop, desktop, mobile, tablet */
        .game-card {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 35px;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
            border: 4px solid var(--primary);
            position: relative;
            margin: auto;
        }

        @media (max-width: 600px) {
            .game-card {
                padding: 20px 15px;
                border-radius: 15px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            .option-btn {
                padding: 12px !important;
            }
        }

        .hidden { display: none !important; }

        /* Adjusted header layout to properly position tracking tools when title is omitted */
        .header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; }

        .hud { font-weight: bold; color: #2c3e50; display: flex; gap: 20px; }

        .progress-container { height: 12px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s; }

        .question-text { font-size: 1.2rem; color: #2c3e50; line-height: 1.6; margin-bottom: 20px; font-weight: 500; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #fdfefe; }
        th, td { border: 1px solid #d5dbdb; padding: 12px; text-align: left; font-size: 1rem; }
        th { background: var(--primary); color: white; }

        .options-grid { display: grid; gap: 12px; }
        .option-btn {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
            color: #34495e;
            width: 100%;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #fbf5fc; }
        .correct { background: var(--success) !important; color: white; border-color: #1e8449 !important; font-weight: bold; }
        .wrong { background: var(--danger) !important; color: white; border-color: #922b21 !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 12px; background: #f5eef8; border-left: 5px solid var(--primary); color: #2c3e50; line-height: 1.5; }

        .btn-next {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            box-shadow: 0 4px 0 #6c3483;
            transition: background 0.2s;
        }
        .btn-next:hover { background: var(--accent); }
        .btn-next:active { transform: translateY(2px); box-shadow: 0 2px 0 #6c3483; }

        .creative-pop {
            font-size: 4.5rem;
            animation: popScale 1.5s infinite alternate ease-in-out;
            margin-bottom: 15px;
        }
        @keyframes popScale {
            0% { transform: scale(1); }
            100% { transform: scale(1.12); }
        }
    </style>
</head>
<body>

<div id="brand-screen">
    <img src="assets/logo.png" alt="Innovine Logo">
</div>

<div class="game-card hidden" id="game-card">

    <div id="instruction-screen">
        <h2 style="color: var(--primary); margin-top: 0;">Instructions</h2>
        <p style="font-size: 1.1rem; color: #2c3e50; line-height: 1.6; margin-bottom: 25px;">
            • Read each question carefully.<br>
            • You will get 2 chances to select the correct answer.<br>
            • If both answers are wrong, the right answer will be displayed.
        </p>
        <button class="btn-next" style="float: none;" onclick="startQuizGame()">Start Game</button>
    </div>
    
    <div id="game-play-area" class="hidden">
        <div class="header">
            <div class="hud">
                <span>Challenge: <span id="q-num">1</span>/10</span>
                <span>Stars: ⭐ <span id="score">0</span></span>
            </div>
        </div>

        <div class="progress-container"><div id="progress-bar"></div></div>

        <div id="quiz-content">
            <div id="data-table-container"></div>
            <div class="question-text" id="q-text"></div>
            <div class="options-grid" id="options-box"></div>
            <div id="feedback-area" class="feedback-box hidden"></div>
            <div style="height: 60px;">
                <button id="next-btn" class="btn-next hidden" onclick="handleNext()">Next Challenge ➡️</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center; padding: 20px 0;">
        <div class="creative-pop">🌟🏆🌟</div>
        <h1 style="color: var(--primary); margin: 10px 0;">Congratulations on Completion!</h1>
        <p id="result-msg" style="font-size: 1.2rem; color: #34495e; line-height: 1.6; margin-bottom: 30px;"></p>
        <button class="btn-next" style="float: none;" onclick="location.reload()">Restart Lab</button>
    </div>
</div>

<script>
    const audio = {
        correct: new Audio('assets/correct.mp3'),
        wrong: new Audio('assets/wrong.mp3'),
        claps: new Audio('assets/freesound_community-claps-44774.mp3')
    };

    // Clean hints without LaTeX symbols or formatting bugs
    const questions = [
        {
            q: "A gardener wants to plant 24 saplings in equal rows. Which of these is NOT a possible arrangement for the garden layout?",
            options: ["A) 4 rows of 6", "B) 3 rows of 8", "C) 5 rows of 5", "D) 2 rows of 12"],
            ans: 2,
            explain: "5 is not a factor of 24. A configuration of 5 rows of 5 would require 25 saplings (5 * 5 = 25), leaving the arrangement incomplete."
        },
        {
            q: "A teacher wants to distribute 135 pencils equally among 5 students. Without using long division, how can she be sure it is perfectly possible?",
            options: [
                "A) The last digit is 5.",
                "B) The sum of the digits is 9.",
                "C) The number is even.",
                "D) The number ends in 0."
            ],
            ans: 0,
            explain: "According to the mathematical rules of divisibility, any whole number that ends with either 0 or 5 is exactly divisible by 5."
        },
        {
            q: "Which of the following numbers of chocolates cannot be shared equally among a group larger than one because it is a Prime Number?",
            options: ["A) 15", "B) 17", "C) 21", "D) 25"],
            ans: 1,
            explain: "17 is a prime number. It possesses exactly two distinct factors: 1 and itself (17), meaning it cannot be broken down into equal sub-groups."
        },
        {
            q: "Two decorative ribbons are 12 cm and 18 cm long. What is the longest equal piece length they can both be perfectly cut into?",
            options: ["A) 2 cm", "B) 3 cm", "C) 6 cm", "D) 9 cm"],
            ans: 2,
            explain: "To find the longest equal section, calculate the Highest Common Factor (HCF) of 12 and 18, which is 6 cm."
        },
        {
            q: "Two automated alarm bells toll at intervals of 4 and 6 minutes respectively. If they toll together right now, after how many minutes will they toll together again?",
            options: ["A) 10 minutes", "B) 2 minutes", "C) 12 minutes", "D) 24 minutes"],
            ans: 2,
            explain: "The time interval before they synchronize again is equal to the Least Common Multiple (LCM) of 4 and 6, which computes to 12 minutes."
        },
        {
            q: "Which of these numbers does NOT logically belong in the group because it is missing from the multiples of 8?",
            options: ["A) 16", "B) 24", "C) 34", "D) 40"],
            ans: 2,
            explain: "16 (8 * 2), 24 (8 * 3), and 40 (8 * 5) are all multiples of 8. 34 is not divisible by 8."
        },
        {
            q: "In a structural factor tree of the number 12, if one sub-branch splits into a value of 3, what must the companion branch at that exact level be?",
            options: ["A) 9", "B) 4", "C) 2", "D) 6"],
            ans: 1,
            explain: "Branches at the same node of a factor tree represent factors whose product equals the parent value. Since 3 * 4 = 12, the missing branch value must be 4."
        },
        {
            q: "Two classmates discover that their class roll numbers are 'Co-prime.' This mathematical definition ensures that their only shared common factor is:",
            options: ["A) 0", "B) 2", "C) 1", "D) Their mathematical product"],
            ans: 2,
            explain: "Co-prime numbers are pairs of integers that do not share any common numerical factors with each other except for the number 1."
        },
        {
            q: "In a standard overlapping Venn diagram tracking the factors of 10 (1, 2, 5, 10) and 15 (1, 3, 5, 15), which common factor should be placed directly inside the center intersection?",
            options: ["A) 2", "B) 3", "C) 5", "D) 10"],
            ans: 2,
            explain: "The intersection zone in a Venn diagram holds shared values. 5 is a common factor found in both sets."
        },
        {
            q: "The HCF of two numbers is 4 and their LCM is 24. If one of these numbers is known to be 8, what value must the other number hold?",
            options: ["A) 12", "B) 6", "C) 16", "D) 20"],
            ans: 0,
            explain: "Use the relationship property formula: HCF * LCM = Product of the two numbers. Here, 4 * 24 = 96. Dividing by the known number gives the missing one: 96 ÷ 8 = 12."
        }
    ];

    let currentIdx = 0, score = 0, attempts = 0;

    function randomizeQuestions() {
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
    }

    // 1) Logo screen stays visible for exactly 5000 milliseconds (5 seconds)
    setTimeout(() => {
        randomizeQuestions();
        document.getElementById('brand-screen').style.display = 'none';
        document.getElementById('game-card').classList.remove('hidden');
    }, 5000);

    function startQuizGame() {
        document.getElementById('instruction-screen').classList.add('hidden');
        document.getElementById('game-play-area').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const data = questions[currentIdx];
        attempts = 0; 
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + '%';

        const tableCont = document.getElementById('data-table-container');
        tableCont.innerHTML = '';

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            box.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const data = questions[currentIdx];
        const feedback = document.getElementById('feedback-area');
        const allBtns = document.querySelectorAll('.option-btn');

        allBtns.forEach(b => b.disabled = true);

        if (idx === data.ans) {
            btn.classList.add('correct');
            try { audio.correct.play(); } catch(e){}
            if (attempts === 0) score++;
            document.getElementById('score').innerText = score;
            feedback.innerHTML = `<b>🌟 Correct!</b><br>${data.explain}`;
            feedback.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            if(currentIdx === questions.length - 1) { try { audio.claps.play(); } catch(e){} }
        } else {
            btn.classList.add('wrong');
            try { audio.wrong.play(); } catch(e){}
            attempts++;

            if (attempts < 2) {
                setTimeout(() => {
                    allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; });
                    feedback.innerHTML = `<b>Not quite right!</b> Check the factors and multiples properties. You have 1 attempt remaining.`;
                    feedback.classList.remove('hidden');
                }, 400);
            } else {
                allBtns[data.ans].classList.add('correct');
                feedback.innerHTML = `<b>Out of attempts!</b> The correct choice was: <i>${data.options[data.ans]}</i>.<br>${data.explain}`;
                feedback.classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            }
        }
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-play-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = '100%';
        try { audio.claps.play(); } catch(e){}
        
        let msg = "Fantastic effort! You have successfully resolved all our factors and multiples challenges and completed the module!";
        if (score === questions.length) msg = "Sensational work! You managed to solve every single number theory puzzle with absolute precision. Incredible job!";
        
        document.getElementById('result-msg').innerText = msg;
    }
</script>

</body>
</html>
