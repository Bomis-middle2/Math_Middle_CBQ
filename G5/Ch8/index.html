<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Skills CBQ</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef3ff;
}

.screen{
    display:none;
    text-align:center;
    padding:20px;
}

#game{
    display:none;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
    border:none;
    border-radius:8px;
}

#msg{
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div id="splash" class="screen" style="display:block;">
    <img src="assets/logo.png" width="180">
</div>

<div id="game" class="screen">
<div class="box">

<h3 id="qtitle"></h3>

<img id="qimg" style="width:100%;border-radius:10px;display:none;">

<div id="options"></div>

<div id="msg"></div>

</div>
</div>

<audio id="correctSound" src="freesound_community-claps-44774.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    loadQuestion(0);
},3000);

let index = 0;
let attempts = 0;

/* ---------------- QUESTIONS ---------------- */
const quiz = [

/* Q1 */
{
q:"Q1: A school map layout shows the sports ground directly at the bottom edge and the library straight up at the top edge. In which direction must a student walk to go directly from the sports ground to the library?",
img:"assets/q1.jpg",
options:["South","North","East","West"],
ans:"North"
},

/* Q2 */
{
q:"Q2: If a student completes their lesson inside the library block and needs to head straight down towards the sports ground at the bottom edge of the map, which direction are they travelling?",
img:"assets/q1.jpg",
options:["North","East","South","West"],
ans:"South"
},

/* Q3 */
{
q:"Q3: Looking closely at the school premises plan, the library is in the centre. The botanical garden area is plotted directly to the right side of the library layout. Where is the garden located?",
img:"assets/q1.jpg",
options:["West of Library","East of Library","North of Gate","South of Playground"],
ans:"East of Library"
},

/* Q4 */
{
q:"Q4: The scale bar printed on a map reads '1cm on paper represents 10m of real ground distance'. If the measured distance between a ticket counter and a food stall is exactly 3cm, what is the actual distance?",
img:"assets/q1.jpg",
options:["13m","30m","300m","3m"],
ans:"30m"
},

/* Q5 */
{
q:"Q5: While studying layouts, a group decides to construct a model scale line. Why is a scale considered an important element when drawing or reading maps?",
img:"assets/q1.jpg",
options:[
"Shows colours",
"Converts map to real distance",
"Decorates map",
"Removes directions"
],
ans:"Converts map to real distance"
},

/* Q6 */
{
q:"Q6: A survey map features various standard symbol keys. What natural geographical feature is traditionally represented by a blue wavy line?",
img:"",
options:["Road","River","Forest","Mountain"],
ans:"River"
},

/* Q7 */
{
q:"Q7: An ambulance driver needs to locate the shortest route to a healthcare centre. Which feature of a map scheme must be analysed to find true lengths?",
img:"",
options:["Colours","Scale distance","Shapes","Names"],
ans:"Scale distance"
},

/* Q8 */
{
q:"Q8: A traveller wakes up early and notices the sun rising directly ahead over the horizon. Which primary direction is the traveller facing at that moment?",
img:"",
options:["North","South","East","West"],
ans:"East"
},

/* Q9 */
{
q:"Q9: A contractor charges ₹500 per centimetre to print map graphics. Maps cannot be drawn to match the exact real size of cities because:",
img:"",
options:[
"Smaller using scale",
"Only drawings",
"Change direction",
"No distance shown"
],
ans:"Smaller using scale"
},

/* Q10 */
{
q:"Q10: A city map guide states that the municipal hospital is located directly west of the school campus and directly east of the public park. What does this indicate about its position?",
img:"",
options:[
"Between both",
"North",
"South",
"Outside"
],
ans:"Between both"
}

];

/* ---------------- LOAD QUESTION ---------------- */
function loadQuestion(i){

attempts = 0;

let q = quiz[i];

document.getElementById("qtitle").innerText = q.q;
document.getElementById("msg").innerText = "";

let img = document.getElementById("qimg");

if(q.img){
    img.src = q.img;
    img.style.display = "block";
}else{
    img.style.display = "none";
}

/* OPTIONS */
let box = document.getElementById("options");
box.innerHTML = "";

q.options.forEach(opt=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(opt);
    box.appendChild(btn);
});

}

/* ---------------- CHECK ---------------- */
function checkAnswer(opt){

let q = quiz[index];

if(opt === q.ans){

    document.getElementById("correctSound").play();

    index++;

    setTimeout(()=>{
        if(index < quiz.length){
            loadQuestion(index);
        }else{
            document.getElementById("game").innerHTML =
            "<h1>🎉 Excellent Work!</h1>";
        }
    },800);

}else{

    document.getElementById("wrongSound").play();
    attempts++;

    if(attempts == 2){
        document.getElementById("msg").innerText =
        "Correct Answer: " + q.ans;
    }else{
        document.getElementById("msg").innerText =
        "Try Again!";
    }
}

}

</script>

</body>
</html>
