<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Map Skills Challenge</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a; /* Deep space slate */
    color: #f8fafc;
    overflow-x: hidden;
}

/* Geometric Background Grid Accent */
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
        linear-gradient(rgba(51, 65, 85, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(51, 65, 85, 0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: -1;
}

.screen {
    display: none;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

#game {
    display: none;
}

.box {
    max-width: 750px;
    margin: 40px auto;
    background: #1e293b; /* Dark card container */
    padding: 30px;
    border-radius: 16px;
    border: 2px solid #38bdf8; /* Neon Cyan Border */
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);
    position: relative;
}

/* Subtle accent corners to feel like a geometric drafting interface */
.box::before, .box::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    border: 2px solid #f43f5e; /* Hot pink corners */
}
.box::before { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 16px; }
.box::after { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 16px; }

h3 {
    text-align: left;
    font-size: 20px;
    color: #f1f5f9;
    line-height: 1.5;
    margin-bottom: 25px;
}

.hud-panel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #38bdf8;
    font-weight: bold;
    letter-spacing: 1.5px;
    font-size: 13px;
    margin-bottom: 15px;
    border-bottom: 1px dashed #334155;
    padding-bottom: 10px;
}

button {
    width: 100%;
    padding: 16px 20px;
    margin: 10px 0;
    font-size: 15px;
    color: #cbd5e1;
    border: 1px solid #475569;
    border-radius: 8px;
    background: #0f172a;
    cursor: pointer;
    font-weight: 600;
    text-align: left;
    transition: all 0.2s ease;
}

button:hover:not(:disabled) {
    background: #1e293b;
    color: #38bdf8;
    border-color: #38bdf8;
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.15);
    transform: translateX(4px);
}

button:disabled {
    cursor: not-allowed;
    opacity: 0.6;
}

#msg {
    font-weight: bold;
    margin-top: 20px;
    font-size: 16px;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    letter-spacing: 0.5px;
}

.try-again-msg {
    color: #f59e0b;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
}

.correct-ans-msg {
    color: #ef4444;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
}

#qimg {
    width: 100%;
    max-width: 450px;
    margin: 0 auto 20px auto;
    border-radius: 8px;
    border: 1px solid #334155;
    display: none;
}

/* Interactive Splash Screen */
#splash {
    background: #0f172a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.geo-shape-container {
    position: relative;
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
}

/* Spinning neon wireframe shape for splash */
.geo-shape {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 3px solid #38bdf8;
    border-radius: 6px;
    animation: rotateShape 4s linear infinite;
}

.geo-shape-inner {
    position: absolute;
    top: 15%; left: 15%; width: 70%; height: 70%;
    border: 3px solid #f43f5e;
    transform: rotate(45deg);
    animation: rotateShapeInner 3s linear infinite;
}

@keyframes rotateShape {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes rotateShapeInner {
    0% { transform: rotate(45deg); }
    100% { transform: rotate(-315deg); }
}

.loader-text {
    font-size: 20px;
    font-weight: 800;
    color: #38bdf8;
    letter-spacing: 4px;
}
</style>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash" class="screen" style="display:flex;">
    <div class="geo-shape-container">
        <div class="geo-shape"></div>
        <div class="geo-shape-inner"></div>
    </div>
    <div class="loader-text">INITIALISING GRID</div>
</div>

<!-- GAME INTERFACE -->
<div id="game" class="screen">
<div class="box">

    <!-- HUD Tracking Panel -->
    <div class="hud-panel">
        <div>MODULE: MAP MATRIX</div>
        <div>VECTOR <span id="q-counter">1</span> / 10</div>
    </div>

    <h3 id="qtitle"></h3>

    <!-- MAP GRAPHIC -->
    <img id="qimg" alt="Map graphic coordinate plane">

    <!-- MULTIPLE CHOICE TARGETS -->
    <div id="options"></div>

    <!-- FEEDBACK ALERT -->
    <div id="msg"></div>

</div>
</div>

<!-- AUDIO SYSTEMS -->
<audio id="correctSound" src="freesound_community-claps-44774.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

// 5-second dynamic loading configuration
setTimeout(()=>{
    document.getElementById("splash").style.display = "none";
    document.getElementById("game").style.display = "block";
    loadQuestion(0);
}, 5000);

let index = 0;
let attempts = 0;

/* ---------------- GEOMETRIC THEMED QUESTION BANK ---------------- */
const quiz = [
{
    q: "A structural grid layout positions a sports pavilion at the base vertex and the central library at the top apex. To trace a linear path directly from the sports pavilion up to the library, which cardinal coordinate vector direction must be taken?",
    img: "assets/q1.jpg",
    options: ["South Direction", "North Direction", "East Direction", "West Direction"],
    ans: "North Direction"
},
{
    q: "If an agent exits the upper library block coordinates and sets a linear course straight down towards the sports pavilion baseline at the bottom edge, what vector heading are they tracking?",
    img: "assets/q1.jpg",
    options: ["North Heading", "East Heading", "South Heading", "West Heading"],
    ans: "South Heading"
},
{
    q: "On a flat-plane map layout, the library occupies the absolute central origin. A dedicated botanical garden zone is mapped outward along the horizontal axis directly to the right side of the library. Where is the garden situated?",
    img: "assets/q1.jpg",
    options: ["West of the Library", "East of the Library", "North of the Main Gate", "South of the Sports Ground"],
    ans: "East of the Library"
},
{
    q: "The standard scale ratio printed onto a tourist town plan states: '1 cm of grid line equals 10 metres of actual ground distance'. If a straight line segment between a ticket turnstile and a food booth spans exactly 3 cm, compute the real distance value.",
    img: "assets/q1.jpg",
    options: ["13 metres", "30 metres", "300 metres", "3 metres"],
    ans: "30 metres"
},
{
    q: "When converting grand geometric structural dimensions down into compact blueprints, why is incorporating an authentic scale system considered non-negotiable?",
    img: "assets/q1.jpg",
    options: [
        "It determines the artistic colour configuration of the landscape elements",
        "It converts raw paper layout measurements accurately into true real-world distances",
        "It acts purely as a decorative framework decoration for the page edges",
        "It cancels out the standard engineering requirement for directional orientation arrows"
    ],
    ans: "It converts raw paper layout measurements accurately into true real-world distances"
},
{
    q: "A geographical blueprint includes key structural symbols. Which real environmental feature does a blue wavy line coordinate path indicate?",
    img: "",
    options: ["A primary asphalt roadway link", "A natural flowing river channel", "A heavy forest canopy grid", "A steep topological mountain ridge"],
    ans: "A natural flowing river channel"
},
{
    q: "A navigation system calculates the shortest track between two vector points. Which primary factor of the map layout must be mathematically cross-referenced to discover correct journey lengths?",
    img: "",
    options: ["The specific visual colour spectrum used", "The exact scale distance values", "The spatial outline shapes of the boundaries", "The alphabetic title labels assigned"],
    ans: "The exact scale distance values"
},
{
    q: "An explorer checks their position at daybreak and establishes that the sun is rising in a straight line directly over the horizon ahead. Which key cardinal target orientation is the explorer looking toward?",
    img: "",
    options: ["North Anchor", "South Anchor", "East Anchor", "West Anchor"],
    ans: "East Anchor"
},
{
    q: "A print engineer budgets ₹500 per centimeter for drafting exact map segments. Maps are mathematically incapable of mimicking the identical, full physical size of regional zones because:",
    img: "",
    options: [
        "Enormous operational spaces are systematically downscaled by clean proportions to fit layout surfaces",
        "They are generated to serve as creative illustrations rather than realistic spatial parameters",
        "They automatically warp spatial directions when mapped onto a flat canvas horizontal plane",
        "They are legally restricted from displaying standard physical ground-distance dimensions"
    ],
    ans: "Enormous operational spaces are systematically downscaled by clean proportions to fit layout surfaces"
},
{
    q: "A municipal planning coordinate guide states that a new public medical facility lies directly west of the school campus zone and directly east of the public park coordinates. Deduce its true placement relation.",
    img: "",
    options: [
        "It is situated exactly intermediate between both reference landmarks",
        "It shifts completely north of the overall development sectors",
        "It positions entirely south of the local infrastructure grid",
        "It sits fully outside the designated territorial boundaries"
    ],
    ans: "It is situated exactly intermediate between both reference landmarks"
}
];

/* ---------------- RENDERING INTERFACE LOGIC ---------------- */
function loadQuestion(i){
    attempts = 0;
    let q = quiz[i];

    document.getElementById("q-counter").innerText = i + 1;
    document.getElementById("qtitle").innerText = q.q;
    
    let msgBox = document.getElementById("msg");
    msgBox.innerText = "";
    msgBox.className = "";

    let img = document.getElementById("qimg");
    if(q.img){
        img.src = q.img;
        img.style.display = "block";
    }else{
        img.style.display = "none";
    }

    let box = document.getElementById("options");
    box.innerHTML = "";

    q.options.forEach(opt=>{
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, btn);
        box.appendChild(btn);
    });
}

/* ---------------- COMPUTATIONAL VERIFICATION ---------------- */
function checkAnswer(opt, clickedBtn){
    let q = quiz[index];
    let msgBox = document.getElementById("msg");

    if(opt === q.ans){
        // Success Highlight: Matrix Lime Green Neon Glow
        clickedBtn.style.background = "rgba(34, 197, 94, 0.15)";
        clickedBtn.style.color = "#4ade80";
        clickedBtn.style.borderColor = "#22c55e";
        clickedBtn.style.boxShadow = "0 0 15px rgba(34, 197, 94, 0.4)";
        
        document.getElementById("correctSound").play();
        
        let buttons = document.getElementById("options").getElementsByTagName("button");
        for(let b of buttons) { b.disabled = true; }

        index++;

        setTimeout(()=>{
            if(index < quiz.length){
                loadQuestion(index);
            }else{
                document.getElementById("game").innerHTML =
                "<h1 style='color:#4ade80; margin-bottom:15px; font-size:28px; letter-spacing:1px;'>🎉 MATRIX CLEAR!</h1><p style='font-size:16px; color:#94a3b8; font-weight:bold;'>All 10 geometric map vectors successfully verified.</p>";
            }
        }, 1200);

    } else {
        document.getElementById("wrongSound").play();
        attempts++;
        
        // Error Highlight: Deflection Hot Pink / Red Alert
        clickedBtn.style.background = "rgba(239, 68, 68, 0.15)";
        clickedBtn.style.color = "#f87171";
        clickedBtn.style.borderColor = "#ef4444";
        clickedBtn.disabled = true;

        if(attempts === 2){
            msgBox.className = "correct-ans-msg";
            msgBox.innerText = "OVERRIDE VALUE: " + q.ans;
            
            let buttons = document.getElementById("options").getElementsByTagName("button");
            for(let b of buttons) { b.disabled = true; }
            
            index++;
            setTimeout(()=>{
                if(index < quiz.length){
                    loadQuestion(index);
                }else{
                    document.getElementById("game").innerHTML =
                    "<h1 style='color:#4ade80; margin-bottom:15px; font-size:28px; letter-spacing:1px;'>🎉 MATRIX CLEAR!</h1><p style='font-size:16px; color:#94a3b8; font-weight:bold;'>All 10 geometric map vectors successfully verified.</p>";
                }
            }, 2500);
        } else {
            msgBox.className = "try-again-msg";
            msgBox.innerText = "VECTOR MISMATCH. RE-CALCULATING... (TRY AGAIN)";
        }
    }
}
</script>

</body>
</html>
