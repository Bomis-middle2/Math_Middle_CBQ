<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Skills</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef3ff;
}

.screen{
    display:none;
    text-align:center;
    padding:20px;
}

#game{
    display:none;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
    border:none;
    border-radius:8px;
}

#msg{
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen" style="display:block;">
    <img src="assets/logo.png" width="180">
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="box">

<h3 id="qtitle"></h3>

<!-- IMAGE ONLY WHEN REQUIRED -->
<img id="qimg" style="width:100%;border-radius:10px;display:none;">

<p id="qtext"></p>

<div id="options"></div>

<div id="msg"></div>

</div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="freesound_community-claps-44774.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    loadQuestion(0);
},3000);

let index = 0;
let attempts = 0;

const quiz = [

/* Q1 */
{
q:"Q1: From Playground to Library, direction is?",
img:"assets/q1.jpg",
options:["South","North","East","West"],
ans:"North"
},

/* Q2 */
{
q:"Q2: From Library to Playground direction is?",
img:"assets/q1.jpg",
options:["North","East","South","West"],
ans:"South"
},

/* Q3 */
{
q:"Q3: Garden is located?",
img:"assets/q1.jpg",
options:["West of Library","East of Library","North of Gate","South of Playground"],
ans:"East of Library"
},

/* Q4 */
{
q:"Q4: Scale 1cm = 10m, 3cm = ?",
img:"assets/q1.jpg",
options:["13m","30m","300m","3m"],
ans:"30m"
},

/* Q5 */
{
q:"Q5: Why is scale important?",
img:"assets/q1.jpg",
options:[
"Shows colours",
"Converts map to real distance",
"Decorates map",
"Removes directions"
],
ans:"Converts map to real distance"
},

/* Q6 NO IMAGE */
{
q:"Q6: Blue wavy line represents?",
img:"",
options:["Road","River","Forest","Mountain"],
ans:"River"
},

/* Q7 NO IMAGE */
{
q:"Q7: Shortest route is found using?",
img:"",
options:["Colours","Scale distance","Shapes","Names"],
ans:"Scale distance"
},

/* Q8 NO IMAGE */
{
q:"Q8: Sun rises in which direction?",
img:"",
options:["North","South","East","West"],
ans:"East"
},

/* Q9 NO IMAGE */
{
q:"Q9: Maps are not exact real size because?",
img:"",
options:[
"Smaller using scale",
"Only drawings",
"Change direction",
"No distance shown"
],
ans:"Smaller using scale"
},

/* Q10 NO IMAGE */
{
q:"Q10: Hospital west of school and east of park means?",
img:"",
options:[
"Between both",
"North",
"South",
"Outside"
],
ans:"Between both"
}

];

function loadQuestion(i){

attempts = 0;
let q = quiz[i];

document.getElementById("qtitle").innerText = q.q;
document.getElementById("msg").innerText = "";

let img = document.getElementById("qimg");

if(q.img){
    img.src = q.img;
    img.style.display = "block";
}else{
    img.style.display = "none";
}

let optBox = document.getElementById("options");
optBox.innerHTML = "";

q.options.forEach(opt=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(opt);
    optBox.appendChild(btn);
});

}

function checkAnswer(opt){

let q = quiz[index];

if(opt === q.ans){

    document.getElementById("correctSound").play();

    index++;

    setTimeout(()=>{
        if(index < quiz.length){
            loadQuestion(index);
        }else{
            document.getElementById("game").innerHTML =
            "<h1>🎉 Excellent Work!</h1>";
        }
    },800);

}else{

    document.getElementById("wrongSound").play();
    attempts++;

    if(attempts == 2){
        document.getElementById("msg").innerText =
        "Correct Answer: " + q.ans;
    }else{
        document.getElementById("msg").innerText =
        "Try Again!";
    }
}

}

</script>

</body>
</html>
