<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Map Skills - Innovine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f6ff;
    overflow:hidden;
}

/* SPLASH */
.screen{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#splash{
    background:white;
}

/* BUTTON */
button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2e6ef7;
    color:white;
}

/* GAME BOX */
.game-box{
    width:95%;
    max-width:900px;
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.options button{
    display:block;
    width:100%;
    margin:10px 0;
}

/* FEEDBACK */
.correct{
    background:green !important;
}
.wrong{
    background:red !important;
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-100px) rotate(0deg);}
    100% {transform: translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- ================= SPLASH ================= -->
<div id="splash" class="screen" style="display:flex;">
    <img src="innovine-logo.png" width="200">
    <h2>Innovine Learning</h2>
</div>

<!-- ================= INSTRUCTIONS ================= -->
<div id="instruction" class="screen">
    <h2>📍 Map Skills CBQ</h2>
    <p>Read the map carefully and answer the question.</p>
    <button onclick="startGame()">Start</button>
</div>

<!-- ================= GAME ================= -->
<div id="game" class="screen">
    <div class="game-box">

        <h3>Q1 — Direction Understanding</h3>

        <!-- MAP IMAGE -->
        <img src="/mnt/data/a_clean_educational_worksheet_multiple_choice_qu.png"
             style="width:100%;border-radius:10px;margin:10px 0;">

        <p>
        If a student walks from Playground to Library, which direction does the student move?
        </p>

        <div class="options">
            <button onclick="check(this,'South')">A. South</button>
            <button onclick="check(this,'North')">B. North</button>
            <button onclick="check(this,'East')">C. East</button>
            <button onclick="check(this,'West')">D. West</button>
        </div>

        <p id="msg"></p>
    </div>
</div>

<!-- ================= END ================= -->
<div id="end" class="screen">
    <h1>🎉 Good Job!</h1>
    <p>You completed the challenge</p>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="freesound_community-claps-44774.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

let attempts = 0;
let correctAnswer = "North";

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("instruction").style.display="flex";
}, 5000);

function startGame(){
    document.getElementById("instruction").style.display="none";
    document.getElementById("game").style.display="flex";
}

function check(btn, answer){

    if(attempts >= 2) return;

    attempts++;

    if(answer === correctAnswer){

        document.getElementById("correctSound").play();
        btn.classList.add("correct");

        setTimeout(()=>{
            showEnd();
        },1000);

    } else {

        document.getElementById("wrongSound").play();
        btn.classList.add("wrong");

        if(attempts == 2){
            document.getElementById("msg").innerHTML =
            "✔ Correct Answer: North";
        } else {
            document.getElementById("msg").innerHTML =
            "Try again!";
        }
    }
}

function showEnd(){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";
    launchConfetti();
}

function launchConfetti(){
    for(let i=0;i<50;i++){
        let c = document.createElement("div");
        c.className="confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","blue","red","green"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
    }
}

</script>

</body>
</html>
