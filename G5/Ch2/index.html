<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Operations</title>
    <style>
        :root {
            --primary: #d35400;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #f4f7f6;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
        }

        body 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 1) Innovine logo screen at start for 5 seconds.. nothing else */
        #brand-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #brand-screen img { 
            width: 80%;
            max-width: 250px; 
            height: auto;
        }

        /* 3) Playable on all screen type laptop, desktop, mobile, tablet */
        .game-card {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 35px;
            border-radius: 25px;
            box-shadow: var(--card-shadow);
            border: 4px solid var(--primary);
            position: relative;
            margin: auto;
        }

        @media (max-width: 600px) {
            .game-card {
                padding: 20px 15px;
                border-radius: 15px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            .option-btn {
                padding: 12px !important;
            }
        }

        .hidden { display: none !important; }

        /* Adjusted header layout to properly position tracking tools when title is omitted */
        .header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; }

        .hud { font-weight: bold; color: #2c3e50; display: flex; gap: 20px; }

        .progress-container { height: 12px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s; }

        .question-text { font-size: 1.2rem; color: #2c3e50; line-height: 1.6; margin-bottom: 20px; font-weight: 500; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #fdfefe; }
        th, td { border: 1px solid #d5dbdb; padding: 12px; text-align: left; font-size: 1rem; }
        th { background: var(--primary); color: white; }

        .options-grid { display: grid; gap: 12px; }
        .option-btn {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
            color: #34495e;
            width: 100%;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #fffcf9; }
        .correct { background: var(--success) !important; color: white; border-color: #1e8449 !important; font-weight: bold; }
        .wrong { background: var(--danger) !important; color: white; border-color: #922b21 !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 12px; background: #fdf2e9; border-left: 5px solid var(--primary); color: #2c3e50; line-height: 1.5; }

        .btn-next {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            box-shadow: 0 4px 0 #a04000;
            transition: background 0.2s;
        }
        .btn-next:hover { background: var(--accent); }
        .btn-next:active { transform: translateY(2px); box-shadow: 0 2px 0 #a04000; }

        .creative-pop {
            font-size: 4.5rem;
            animation: popScale 1.5s infinite alternate ease-in-out;
            margin-bottom: 15px;
        }
        @keyframes popScale {
            0% { transform: scale(1); }
            100% { transform: scale(1.12); }
        }
    </style>
</head>
<body>

<div id="brand-screen">
    <img src="assets/logo.png" alt="Innovine Logo">
</div>

<div class="game-card hidden" id="game-card">

    <div id="instruction-screen">
        <h2 style="color: var(--primary); margin-top: 0;">Instructions</h2>
        <p style="font-size: 1.1rem; color: #2c3e50; line-height: 1.6; margin-bottom: 25px;">
            • Read each case study scenario carefully.<br>
            • You will get 2 chances to select the correct answer.<br>
            • If both answers are wrong, the right answer will be displayed.
        </p>
        <button class="btn-next" style="float: none;" onclick="startQuizGame()">Start Game</button>
    </div>
    
    <div id="game-play-area" class="hidden">
        <div class="header">
            <div class="hud">
                <span>Challenge: <span id="q-num">1</span>/10</span>
                <span>Stars: ⭐ <span id="score">0</span></span>
            </div>
        </div>

        <div class="progress-container"><div id="progress-bar"></div></div>

        <div id="quiz-content">
            <div id="data-table-container"></div>
            <div class="question-text" id="q-text"></div>
            <div class="options-grid" id="options-box"></div>
            <div id="feedback-area" class="feedback-box hidden"></div>
            <div style="height: 60px;">
                <button id="next-btn" class="btn-next hidden" onclick="handleNext()">Next Challenge ➡️</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center; padding: 20px 0;">
        <div class="creative-pop">🌟🏆🌟</div>
        <h1 style="color: var(--primary); margin: 10px 0;">Congratulations on Completion!</h1>
        <p id="result-msg" style="font-size: 1.2rem; color: #34495e; line-height: 1.6; margin-bottom: 30px;"></p>
        <button class="btn-next" style="float: none;" onclick="location.reload()">Restart Lab</button>
    </div>
</div>

<script>
    const audio = {
        correct: new Audio('assets/correct.mp3'),
        wrong: new Audio('assets/wrong.mp3'),
        claps: new Audio('assets/freesound_community-claps-44774.mp3')
    };

    // Authentic CBQ level Grade 5 data structures
    const questions = [
        {
            q: "Case Scenario: A city council launches an eco-plantation drive across two separate forest reserves. According to the field logs, the north reserve was populated with 12,450 non-flowering shrubs and the south reserve received 15,200 decorative trees. Based on this environmental project data, what is the combined total number of plant assets introduced to the community spaces?",
            options: ["A) 27,650", "B) 2,750", "C) 27,450", "D) 37,650"],
            ans: 0,
            explain: "To solve this case evaluation, add both plant segments together: 12,450 + 15,200 = 27,650 total assets."
        },
        {
            q: "Case Scenario: An automated processing factory manufactured a macro batch containing 85,000 diagnostic bulb units during its morning run. A secondary quality audit check revealed that exactly 2,400 bulbs sustained damage during fast-sorting transit. Reviewing these factory logistics logs, how many fully operational bulbs are left intact?",
            options: ["A) 87,400", "B) 82,600", "C) 83,600", "D) 82,000"],
            ans: 1,
            explain: "Extract the data patterns and subtract broken inventory allocations from the total production index: 85,000 - 2,400 = 82,600."
        },
        {
            q: "Case Scenario: An international conference coordinator maps layout metrics for student groups. Standard transit parameters show that one specific school bus model can securely carry up to 52 students per route. If the dispatcher assigns 15 of these identical buses to run simultaneously, how many students can be moved?",
            options: ["A) 780", "B) 520", "C) 670", "D) 800"],
            ans: 0,
            explain: "Analyze unit capacities and scale upward via multiplication across the vehicle deployment fleet: 52 × 15 = 780."
        },
        {
            q: "Case Scenario: A local agriculture harvest farmer records a seasonal yield of 1,200 organic apples. He aims to distribute this entire payload equally across 12 identical cardboard layout storage boxes for market delivery. Deduce the exact box capacity requirements: how many apples must be inside each container?",
            options: ["A) 12", "B) 100", "C) 120", "D) 1,00,0"],
            ans: 1,
            explain: "Divide the complete inventory metrics systematically by the structural unit layout count: 1,200 ÷ 12 = 100."
        },
        {
            q: "Case Scenario: Simran monitors her banking wallet ledger which displays a beginning liquidity value of ₹5,000. She then coordinates multiple retail transactions, spending ₹1,200 on an evening dress followed by a ₹800 charge for sports shoes. Evaluating Simran's current expense trends, how much liquid currency remains in her balance?",
            options: ["A) ₹3,000", "B) ₹2,000", "C) ₹4,200", "D) ₹3,800"],
            ans: 0,
            explain: "Aggregate expenditure balance equals ₹1,200 + ₹800 = ₹2,000. Leftover wallet volume is found via subtraction: ₹5,000 - ₹2,000 = ₹3,000."
        },
        {
            q: "Case Scenario: A new school wing features 25 structural classrooms, and architecture designs show that each individual room requires a fixed count of 40 chairs. The logistics manager checks the storage rooms and finds that 900 operational chairs are already available. Calculate the supply discrepancy: how many more chairs must the team buy?",
            options: ["A) 1,00,0", "B) 100", "C) 1,900", "D) 400"],
            ans: 1,
            explain: "Total required target allocation = 25 × 40 = 1,000. Net procurement requirements minus stock baseline: 1,000 - 900 = 100."
        },
        {
            q: "Case Scenario: A software developer writes a data compression algorithm that takes a dynamic, extremely large incoming number stream and runs it through a multiplication loop where the constant modifier variable is locked at absolute 0. No matter how large the initial numbers scale, the algorithm's output will always be:",
            options: ["A) The number itself", "B) 1", "C) 0", "D) 10"],
            ans: 2,
            explain: "According to core multiplicative laws, mapping any numeric scale value factor against zero yields an evaluation value of zero."
        },
        {
            q: "Case Scenario: A student operating a digital desktop lab simulator attempted to scale down a dataset by solving 450 ÷ 10, but the final display mistakenly rendered a value of 4,500. Based on how system interfaces transform numbers, what calculation operation did they perform by accident?",
            options: ["A) Subtraction", "B) Addition", "C) Multiplication", "D) Estimation"],
            ans: 2,
            explain: "Multiplying changes place parameters upward by adding zero placeholders (450 × 10 = 4,500), while division strips place values down (450 ÷ 10 = 45)."
        },
        {
            q: "Case Scenario: A corporate supply officer reviews a financial database logging operational metrics for a distribution branch. She views an interactive market sales ledger covering the last two business days to evaluate growth trends.",
            table: [["Day", "Sales Revenue"], ["Wednesday", "₹5,100"], ["Tuesday", "₹3,200"]],
            options: ["A) ₹1,900", "B) ₹2,100", "C) ₹8,300", "D) ₹1,200"],
            ans: 0,
            explain: "Isolate the data rows inside the provided table layout and extract the variance via subtraction: ₹5,100 - ₹3,200 = ₹1,900."
        },
        {
            q: "Case Scenario: A regional humanitarian relief camp maintains a grain stock warehouse containing a massive emergency payload of 48,000 kg of rice. Logistics field parameters mandate that exactly 4,000 kg of rice must be dispatched every single day to local families. For how long will this current rice cargo stock run?",
            options: ["A) 10 days", "B) 12 days", "C) 48 days", "D) 8 days"],
            ans: 1,
            explain: "Calculate the system sustainability rate by dividing total bulk mass by the daily consumption constant: 48,000 ÷ 4,000 = 12."
        }
    ];

    let currentIdx = 0, score = 0, attempts = 0;

    function randomizeQuestions() {
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
    }

    // 1) Logo screen stays visible for exactly 5 seconds
    setTimeout(() => {
        randomizeQuestions();
        document.getElementById('brand-screen').style.display = 'none';
        document.getElementById('game-card').classList.remove('hidden');
    }, 5000);

    function startQuizGame() {
        document.getElementById('instruction-screen').classList.add('hidden');
        document.getElementById('game-play-area').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const data = questions[currentIdx];
        attempts = 0; 
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + '%';

        const tableCont = document.getElementById('data-table-container');
        tableCont.innerHTML = '';
        if (data.table) {
            const table = document.createElement('table');
            data.table.forEach((row, i) => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const el = i === 0 ? document.createElement('th') : document.createElement('td');
                    el.innerText = cell;
                    tr.appendChild(el);
                });
                table.appendChild(tr);
            });
            tableCont.appendChild(table);
        }

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            box.appendChild(btn);
        });
    }

    // 5) 2 chances calculation loop logic
    function checkAnswer(idx, btn) {
        const data = questions[currentIdx];
        const feedback = document.getElementById('feedback-area');
        const allBtns = document.querySelectorAll('.option-btn');

        allBtns.forEach(b => b.disabled = true);

        if (idx === data.ans) {
            btn.classList.add('correct');
            try { audio.correct.play(); } catch(e){}
            if (attempts === 0) score++;
            document.getElementById('score').innerText = score;
            feedback.innerHTML = `<b>🌟 Correct Case Analysis!</b><br>${data.explain}`;
            feedback.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            if(currentIdx === questions.length - 1) { try { audio.claps.play(); } catch(e){} }
        } else {
            btn.classList.add('wrong');
            try { audio.wrong.play(); } catch(e){}
            attempts++;

            if (attempts < 2) {
                setTimeout(() => {
                    allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; });
                    feedback.innerHTML = `<b>Incorrect deduction!</b> Examine the case values again. You have 1 final attempt remaining.`;
                    feedback.classList.remove('hidden');
                }, 400);
            } else {
                allBtns[data.ans].classList.add('correct');
                feedback.innerHTML = `<b>Out of attempts!</b> The correct case solution choice was: <i>${data.options[data.ans]}</i>.<br>${data.explain}`;
                feedback.classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            }
        }
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-play-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = '100%';
        try { audio.claps.play(); } catch(e){}
        
        let msg = "Fantastic effort! You have successfully resolved all our case scenarios and finalized the assignment modules!";
        if (score === questions.length) msg = "Sensational work! You managed to solve every single practical case application with absolute precision. Incredible job!";
        
        document.getElementById('result-msg').innerText = msg;
    }
</script>

</body>
</html>
