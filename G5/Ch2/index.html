<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Basic Operations Game</title>
    <style>
        :root {
            --primary: #2980b9;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #0f172a;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 1) Centered Logo Screen Layout */
        #brand-screen {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            margin-bottom: 20px;
            width: 100%;
        }
        #brand-screen img { 
            width: 80%;
            max-width: 220px; 
            height: auto;
            object-fit: contain;
        }
        .loader-bar-bg {
            width: 200px;
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
        }
        .loader-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* 3) Adaptive Cross-Device Container Box */
        .game-card {
            width: 100%;
            max-width: 650px;
            background: #1e293b;
            padding: 35px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 3px solid var(--primary);
            position: relative;
        }

        @media (max-width: 600px) {
            .game-card {
                padding: 24px 16px;
                border-radius: 16px;
            }
            .option-btn {
                padding: 14px !important;
                font-size: 1rem !important;
            }
            #q-text {
                font-size: 1.15rem !important;
            }
        }

        .hidden { display: none !important; }

        .header { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            margin-bottom: 15px; 
        }
        .hud { 
            font-weight: bold; 
            color: #38bdf8; 
            display: flex; 
            gap: 20px; 
            font-size: 1.1rem;
        }

        .progress-container { 
            height: 10px; 
            background: #334155; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            overflow: hidden; 
        }
        #progress-bar { 
            height: 100%; 
            background: var(--primary); 
            width: 0%; 
            transition: width 0.4s ease; 
        }

        .question-text { 
            font-size: 1.3rem; 
            color: #f1f5f9; 
            line-height: 1.5; 
            margin-bottom: 25px; 
            font-weight: 600; 
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr;
            gap: 14px; 
        }
        .option-btn {
            padding: 16px;
            border: 2px solid #334155;
            border-radius: 14px;
            background: #334155;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: left;
            transition: background 0.2s, border-color 0.2s;
            color: #f1f5f9;
            width: 100%;
        }
        .option-btn:hover:not(:disabled) { 
            border-color: var(--primary); 
            background: #475569; 
        }
        
        .correct { background: var(--success) !important; color: white; border-color: #1e8449 !important; font-weight: bold; }
        .wrong { background: var(--danger) !important; color: white; border-color: #922b21 !important; animation: shake 0.4s; }

        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-6px); } 
            75% { transform: translateX(6px); } 
        }

        .feedback-box { 
            margin-top: 20px; 
            padding: 16px; 
            border-radius: 14px; 
            background: #0f172a; 
            border-left: 5px solid var(--primary); 
            color: #cbd5e1; 
            line-height: 1.5; 
            font-size: 1.05rem;
        }

        .btn-next {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            float: right;
            box-shadow: 0 4px 0 #1b4f72;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-next:hover { background: var(--accent); }
        .btn-next:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b4f72; }

        .creative-pop {
            font-size: 4.5rem;
            animation: popScale 1.5s infinite alternate ease-in-out;
            margin-bottom: 15px;
        }
        @keyframes popScale {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

<div id="brand-screen">
    <div class="logo-wrapper">
        <img src="assets/logo.png" alt="Innovine Logo" onerror="this.style.opacity='0.5';">
    </div>
    <h2 style="color: #f8fafc; font-size: 1.8rem; margin-bottom: 20px; letter-spacing: 1px; font-weight: 700;">INNOVINE MATH</h2>
    <div class="loader-bar-bg">
        <div id="loader-fill" class="loader-bar-fill"></div>
    </div>
</div>

<div class="game-card hidden" id="game-card">

    <div id="instruction-screen">
        <h2 style="color: var(--primary); margin-bottom: 15px;">Chapter 2: Basic Operations</h2>
        <p style="font-size: 1.1rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 25px;">
            • Test your addition, subtraction, multiplication, and division skills!<br>
            • You have <b>2 attempts</b> to find the correct answer for each challenge.<br>
            • Let's jump into the calculations!
        </p>
        <button class="btn-next" style="float: none;" onclick="startQuizGame()">Start Chapter</button>
    </div>
    
    <div id="game-play-area" class="hidden">
        <div class="header">
            <div class="hud">
                <span>Operation: <span id="q-num">1</span>/10</span>
                <span>Stars: ⭐ <span id="score">0</span></span>
            </div>
        </div>

        <div class="progress-container"><div id="progress-bar"></div></div>

        <div id="quiz-content">
            <div class="question-text" id="q-text"></div>
            <div class="options-grid" id="options-box"></div>
            <div id="feedback-area" class="feedback-box hidden"></div>
            <div style="height: 60px;">
                <button id="next-btn" class="btn-next hidden" onclick="handleNext()">Next Operation ➡️</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center; padding: 20px 0;">
        <div class="creative-pop">🎉🧮⚡</div>
        <h1 style="color: var(--primary); margin: 10px 0;">Chapter Complete!</h1>
        <p id="result-msg" style="font-size: 1.2rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 30px;"></p>
        <button class="btn-next" style="float: none;" onclick="location.reload()">Restart Quiz</button>
    </div>
</div>

<script>
    const audio = {
        correct: new Audio('assets/correct.mp3'),
        wrong: new Audio('assets/wrong.mp3'),
        claps: new Audio('assets/freesound_community-claps-44774.mp3')
    };

    // Strict Basic Operations Questions Only (No factors/multiples)
    const questions = [
        {
            q: "Find the sum: 4,500 + 3,250",
            options: ["A) 7,550", "B) 7,750", "C) 8,750", "D) 7,250"],
            ans: 1,
            explain: "Aligning the digits by place value: 4,500 plus 3,250 equals 7,750."
        },
        {
            q: "Find the difference: 8,600 - 2,400",
            options: ["A) 6,000", "B) 5,200", "C) 6,200", "D) 6,400"],
            ans: 2,
            explain: "Subtracting 2,400 from 8,600 gives exactly 6,200."
        },
        {
            q: "What is the product of 15 × 4?",
            options: ["A) 45", "B) 50", "C) 55", "D) 60"],
            ans: 3,
            explain: "Multiplying 15 by 4 gives 60 (15 + 15 + 15 + 15 = 60)."
        },
        {
            q: "Divide: 120 ÷ 6",
            options: ["A) 12", "B) 20", "C) 30", "D) 200"],
            ans: 1,
            explain: "Since 12 divided by 6 is 2, 120 divided by 6 equals 20."
        },
        {
            q: "A box contains 25 boxes of crayons. Each box has 10 crayons. How many crayons are there in total?",
            options: ["A) 35", "B) 150", "C) 250", "D) 2,500"],
            ans: 2,
            explain: "To find the total, use multiplication: 25 × 10 = 250 crayons."
        },
        {
            q: "If you subtract 0 from any number, the answer is:",
            options: ["A) 0", "B) 1", "C) The number itself", "D) Double the number"],
            ans: 2,
            explain: "The Identity Property of Subtraction states that subtracting 0 from a number leaves it unchanged."
        },
        {
            *q*: "What is the result when you multiply any number by 0?",
            options: ["A) 0", "B) 1", "C) The same number", "D) 10"],
            ans: 0,
            explain: "The Zero Property of Multiplication means any number multiplied by 0 always equals 0."
        },
        {
            q: "An orchard has 48 apples to share equally among 4 children. How many apples does each child get?",
            options: ["A) 10", "B) 11", "C) 12", "D) 14"],
            ans: 2,
            explain: "Use division to share equally: 48 ÷ 4 = 12 apples per child."
        },
        {
            q: "Solve: 350 + 150 - 100",
            options: ["A) 400", "B) 500", "C) 300", "D) 450"],
            ans: 0,
            explain: "First add 350 + 150 = 500. Then subtract 100 from 500 to get 400."
        },
        {
            q: "What number must be added to 700 to make it 1,000?",
            options: ["A) 200", "B) 300", "C) 400", "D) 1,300"],
            ans: 1,
            explain: "You can find the missing part by subtracting: 1,000 - 700 = 300."
        }
    ];

    let currentIdx = 0, score = 0, attempts = 0;

    function randomizeQuestions() {
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
    }

    // Loader progress bar setup tracking exactly 5000ms
    window.addEventListener('DOMContentLoaded', () => {
        const fill = document.getElementById('loader-fill');
        let pct = 0;
        
        const loaderTimer = setInterval(() => {
            pct += 1;
            fill.style.width = pct + '%';
            if (pct >= 100) {
                clearInterval(loaderTimer);
                randomizeQuestions();
                document.getElementById('brand-screen').style.display = 'none';
                document.getElementById('game-card').classList.remove('hidden');
            }
        }, 50);
    });

    function startQuizGame() {
        document.getElementById('instruction-screen').classList.add('hidden');
        document.getElementById('game-play-area').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const data = questions[currentIdx];
        attempts = 0; 
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + '%';

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            box.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const data = questions[currentIdx];
        const feedback = document.getElementById('feedback-area');
        const allBtns = document.querySelectorAll('.option-btn');

        allBtns.forEach(b => b.disabled = true);

        if (idx === data.ans) {
            btn.classList.add('correct');
            try { audio.correct.play(); } catch(e){}
            if (attempts === 0) score++;
            document.getElementById('score').innerText = score;
            feedback.innerHTML = `<b>🌟 Correct!</b><br>${data.explain}`;
            feedback.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            if(currentIdx === questions.length - 1) { try { audio.claps.play(); } catch(e){} }
        } else {
            btn.classList.add('wrong');
            try { audio.wrong.play(); } catch(e){}
            attempts++;

            if (attempts < 2) {
                setTimeout(() => {
                    allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; });
                    feedback.innerHTML = `<b>Not quite right!</b> Check your arithmetic. 1 attempt left.`;
                    feedback.classList.remove('hidden');
                }, 400);
            } else {
                allBtns[data.ans].classList.add('correct');
                feedback.innerHTML = `<b>Out of attempts!</b> The correct choice was: <b>${data.options[data.ans]}</b>.<br>${data.explain}`;
                feedback.classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            }
        }
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-play-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = '100%';
        try { audio.claps.play(); } catch(e){}
        
        let msg = `Great effort! You completed the operations chapter and earned ${score} out of 10 stars!`;
        if (score === questions.length) msg = "Sensational! Perfect arithmetic performance. You have mastered addition, subtraction, multiplication, and division!";
        
        document.getElementById('result-msg').innerText = msg;
    }
</script>

</body>
</html>
