<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Operations Challenge</title>
    <style>
        :root {
            --primary: #2980b9;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #0f172a;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 1) Pure White Startup Logo Screen Layout (Displays for 5 seconds) */
        #brand-screen {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            margin-bottom: 20px;
            width: 100%;
        }
        #brand-screen img { 
            width: 80%;
            max-width: 220px; 
            height: auto;
            object-fit: contain;
        }
        .loader-bar-bg {
            width: 200px;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
        }
        .loader-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px rgba(41, 128, 185, 0.5);
        }

        /* Adaptive Cross-Device Container Box */
        .game-card {
            width: 100%;
            max-width: 650px;
            background: #1e293b;
            padding: 35px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 3px solid var(--primary);
            position: relative;
        }

        @media (max-width: 600px) {
            .game-card {
                padding: 24px 16px;
                border-radius: 16px;
            }
            .option-btn {
                padding: 14px !important;
                font-size: 1rem !important;
            }
            #q-text {
                font-size: 1.15rem !important;
            }
        }

        .hidden { display: none !important; }

        .header { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            margin-bottom: 15px; 
        }
        .hud { 
            font-weight: bold; 
            color: #38bdf8; 
            display: flex; 
            gap: 20px; 
            font-size: 1.1rem;
        }

        .progress-container { 
            height: 10px; 
            background: #334155; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            overflow: hidden; 
        }
        #progress-bar { 
            height: 100%; 
            background: var(--primary); 
            width: 0%; 
            transition: width 0.4s ease; 
        }

        .question-text { 
            font-size: 1.3rem; 
            color: #f1f5f9; 
            line-height: 1.5; 
            margin-bottom: 25px; 
            font-weight: 600; 
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr;
            gap: 14px; 
        }
        .option-btn {
            padding: 16px;
            border: 2px solid #334155;
            border-radius: 14px;
            background: #334155;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: left;
            transition: background 0.2s, border-color 0.2s;
            color: #f1f5f9;
            width: 100%;
        }
        .option-btn:hover:not(:disabled) { 
            border-color: var(--primary); 
            background: #475569; 
        }
        
        .correct { background: var(--success) !important; color: white; border-color: #1e8449 !important; font-weight: bold; }
        .wrong { background: var(--danger) !important; color: white; border-color: #922b21 !important; animation: shake 0.4s; }

        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-6px); } 
            75% { transform: translateX(6px); } 
        }

        .feedback-box { 
            margin-top: 20px; 
            padding: 16px; 
            border-radius: 14px; 
            background: #0f172a; 
            border-left: 5px solid var(--primary); 
            color: #cbd5e1; 
            line-height: 1.5; 
            font-size: 1.05rem;
        }

        .btn-next {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            float: right;
            box-shadow: 0 4px 0 #1b4f72;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-next:hover { background: var(--accent); }
        .btn-next:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b4f72; }

        .creative-pop {
            font-size: 4.5rem;
            animation: popScale 1.5s infinite alternate ease-in-out;
            margin-bottom: 15px;
        }
        @keyframes popScale {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

<!-- White Startup Logo Layer (Only Logo Image, No Brand Text Displayed) -->
<div id="brand-screen">
    <div class="logo-wrapper">
        <img src="assets/logo.png" alt="Logo" onerror="this.style.opacity='0.5';">
    </div>
    <div class="loader-bar-bg" style="margin-top: 10px;">
        <div id="loader-fill" class="loader-bar-fill"></div>
    </div>
</div>

<div class="game-card hidden" id="game-card">

    <!-- Instructions Interface -->
    <div id="instruction-screen">
        <h2 style="color: var(--primary); margin-bottom: 15px;">Basic Operations Challenge</h2>
        <p style="font-size: 1.1rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 25px;">
            • Test your advanced addition, subtraction, multiplication, and division skills!<br>
            • You have <b>2 attempts</b> to solve each multi-step mathematical puzzle.<br>
            • Read carefully and apply proper order of operations. Good luck!
        </p>
        <button class="btn-next" style="float: none;" onclick="startQuizGame()">Start Game</button>
    </div>
    
    <!-- Gameplay Loop Deck -->
    <div id="game-play-area" class="hidden">
        <div class="header">
            <div class="hud">
                <span>Problem: <span id="q-num">1</span>/10</span>
                <span>Stars: ⭐ <span id="score">0</span></span>
            </div>
        </div>

        <div class="progress-container"><div id="progress-bar"></div></div>

        <div id="quiz-content">
            <div class="question-text" id="q-text"></div>
            <div class="options-grid" id="options-box"></div>
            <div id="feedback-area" class="feedback-box hidden"></div>
            <div style="height: 60px;">
                <button id="next-btn" class="btn-next hidden" onclick="handleNext()">Next Challenge ➡️</button>
            </div>
        </div>
    </div>

    <!-- Final Result Windows -->
    <div id="result-screen" class="hidden" style="text-align: center; padding: 20px 0;">
        <div class="creative-pop">🎉🧮⚡</div>
        <h1 style="color: var(--primary); margin: 10px 0;">Challenge Complete!</h1>
        <p id="result-msg" style="font-size: 1.2rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 30px;"></p>
        <button class="btn-next" style="float: none;" onclick="location.reload()">Restart Quiz</button>
    </div>
</div>

<script>
    const audio = {
        correct: new Audio('assets/correct.mp3'),
        wrong: new Audio('assets/wrong.mp3'),
        claps: new Audio('assets/freesound_community-claps-44774.mp3')
    };

    // Upgraded Higher-Level Basic Operations Questions
    const questions = [
        {
            q: "A large warehouse ordered 14,250 boxes of electronics. They shipped out 5,875 boxes in the morning and 4,390 boxes in the afternoon. How many boxes remain in the warehouse?",
            options: ["A) 3,985 boxes", "B) 4,015 boxes", "C) 4,125 boxes", "D) 4,985 boxes"],
            ans: 0,
            explain: "Total shipped = 5,875 + 4,390 = 10,265. Remaining boxes = 14,250 - 10,265 = 3,985 boxes."
        },
        {
            q: "A school budget of $24,500 was increased by $3,750 for learning materials. If the total amount is now split equally among 5 departments, how much does each department receive?",
            options: ["A) $4,900", "B) $5,550", "C) $5,650", "D) $5,825"],
            ans: 2,
            explain: "Total budget = $24,500 + $3,750 = $28,250. Shared among 5 departments: $28,250 ÷ 5 = $5,650."
        },
        {
            q: "An orchard packs apples into crates. Each crate contains 24 boxes, and each box holds 15 apples. If they fill 12 crates, what is the total number of apples packed?",
            options: ["A) 360 apples", "B) 2,880 apples", "C) 3,456 apples", "D) 4,320 apples"],
            ans: 3,
            explain: "Apples per crate = 24 × 15 = 360 apples. Total for 12 crates = 360 × 12 = 4,320 apples."
        },
        {
            q: "A charity wants to distribute 1,845 books equally to 15 different community centers. How many books will each center receive, and how many extra books will be left over?",
            options: ["A) 123 books each, 0 left over", "B) 121 books each, 4 left over", "C) 122 books each, 1 left over", "D) 123 books each, 3 left over"],
            ans: 0,
            explain: "Dividing 1,845 by 15 gives exactly 123 with a remainder of 0."
        },
        {
            q: "Solve the following expression matching proper mathematical operational hierarchy: 120 + (45 × 4) - (150 ÷ 5)",
            options: ["A) 150", "B) 270", "C) 330", "D) 630"],
            ans: 1,
            explain: "Perform inner operations first: (45 × 4) = 180 and (150 ÷ 5) = 30. Then complete the chain: 120 + 180 - 30 = 270."
        },
        {
            q: "A factory manufactures 345 toy cars every hour. The factory runs for two 8-hour shifts every day. How many toy cars are produced in 5 days?",
            options: ["A) 13,800 toy cars", "B) 27,600 toy cars", "C) 3,450 toy cars", "D) 17,250 toy cars"],
            ans: 1,
            explain: "Hours per day = 2 × 8 = 16 hours. Total hours in 5 days = 16 × 5 = 80 hours. Total cars = 345 × 80 = 27,600."
        },
        {
            q: "The difference between two numbers is 3,450. If the smaller number is 8,765, what is the value of the larger number?",
            options: ["A) 5,315", "B) 11,115", "C) 12,215", "D) 12,315"],
            ans: 2,
            explain: "To find the larger number, add the difference to the smaller number: 8,765 + 3,450 = 12,215."
        },
        {
            q: "An auditorium has 32 rows of seats with 25 seats in each row. If a concert sells out all but 45 seats, how many tickets were sold?",
            options: ["A) 755 tickets", "B) 800 tickets", "C) 845 tickets", "D) 745 tickets"],
            ans: 0,
            explain: "Total seats capacity = 32 × 25 = 800 seats. Sold tickets = 800 - 45 = 755 tickets."
        },
        {
            q: "A farmer harvests 2,560 kg of potatoes. He keeps 160 kg for his family and packs the rest into 40 kg sacks to sell. How many sacks can he sell?",
            options: ["A) 60 sacks", "B) 64 sacks", "C) 68 sacks", "D) 72 sacks"],
            ans: 0,
            explain: "Weight of potatoes to sell = 2,560 - 160 = 2,400 kg. Number of 40 kg sacks = 2,400 ÷ 40 = 60 sacks."
        },
        {
            q: "A computer costs $1,250 and a tablet costs $450. A company purchase manager orders 6 computers and 8 tablets. What is the total transaction cost?",
            options: ["A) $10,500", "B) $11,100", "C) $11,300", "D) $12,100"],
            ans: 1,
            explain: "Cost of computers = 6 × $1,250 = $7,500. Cost of tablets = 8 × $450 = $3,600. Combined cost = $7,500 + $3,600 = $11,100."
        }
    ];

    let currentIdx = 0, score = 0, attempts = 0;

    function randomizeQuestions() {
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
    }

    // Precise Logo progress timer tracking exactly 5000ms (5 seconds)
    window.addEventListener('DOMContentLoaded', () => {
        const fill = document.getElementById('loader-fill');
        let pct = 0;
        
        const loaderTimer = setInterval(() => {
            pct += 1;
            fill.style.width = pct + '%';
            if (pct >= 100) {
                clearInterval(loaderTimer);
                randomizeQuestions();
                document.getElementById('brand-screen').style.display = 'none';
                document.getElementById('game-card').classList.remove('hidden');
            }
        }, 50); // 100 iterations * 50ms = 5000ms
    });

    function startQuizGame() {
        document.getElementById('instruction-screen').classList.add('hidden');
        document.getElementById('game-play-area').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const data = questions[currentIdx];
        attempts = 0; 
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + '%';

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            box.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const data = questions[currentIdx];
        const feedback = document.getElementById('feedback-area');
        const allBtns = document.querySelectorAll('.option-btn');

        allBtns.forEach(b => b.disabled = true);

        if (idx === data.ans) {
            btn.classList.add('correct');
            try { audio.correct.play(); } catch(e){}
            if (attempts === 0) score++;
            document.getElementById('score').innerText = score;
            feedback.innerHTML = `<b>🌟 Correct!</b><br>${data.explain}`;
            feedback.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            if(currentIdx === questions.length - 1) { try { audio.claps.play(); } catch(e){} }
        } else {
            btn.classList.add('wrong');
            try { audio.wrong.play(); } catch(e){}
            attempts++;

            if (attempts < 2) {
                setTimeout(() => {
                    allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; });
                    feedback.innerHTML = `<b>Not quite right!</b> Check your calculations. 1 attempt left.`;
                    feedback.classList.remove('hidden');
                }, 400);
            } else {
                allBtns[data.ans].classList.add('correct');
                feedback.innerHTML = `<b>Out of attempts!</b> The correct choice was: <b>${data.options[data.ans]}</b>.<br>${data.explain}`;
                feedback.classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            }
        }
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-play-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = '100%';
        try { audio.claps.play(); } catch(e){}
        
        let msg = `Great effort! You completed the challenge and earned ${score} out of 10 stars!`;
        if (score === questions.length) msg = "Sensational! Perfect operational logic. You have completely mastered complex problem solving!";
        
        document.getElementById('result-msg').innerText = msg;
    }
</script>

</body>
</html>
