<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factors and Multiples Game</title>
    <style>
        :root {
            --primary: #8e44ad;
            --accent: #9b59b6;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #0f172a;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 1) Fixed Centered Logo Screen Style */
        #brand-screen {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            margin-bottom: 20px;
            width: 100%;
        }
        #brand-screen img { 
            width: 80%;
            max-width: 220px; 
            height: auto;
            object-fit: contain;
        }
        .loader-bar-bg {
            width: 200px;
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
        }
        .loader-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* 3) Adaptive Cross-Device Container Box */
        .game-card {
            width: 100%;
            max-width: 650px;
            background: #1e293b;
            padding: 35px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 3px solid var(--primary);
            position: relative;
        }

        @media (max-width: 600px) {
            .game-card {
                padding: 24px 16px;
                border-radius: 16px;
            }
            .option-btn {
                padding: 14px !important;
                font-size: 1rem !important;
            }
            #q-text {
                font-size: 1.15rem !important;
            }
        }

        .hidden { display: none !important; }

        .header { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            margin-bottom: 15px; 
        }
        .hud { 
            font-weight: bold; 
            color: #38bdf8; 
            display: flex; 
            gap: 20px; 
            font-size: 1.1rem;
        }

        .progress-container { 
            height: 10px; 
            background: #334155; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            overflow: hidden; 
        }
        #progress-bar { 
            height: 100%; 
            background: var(--primary); 
            width: 0%; 
            transition: width 0.4s ease; 
        }

        .question-text { 
            font-size: 1.3rem; 
            color: #f1f5f9; 
            line-height: 1.5; 
            margin-bottom: 25px; 
            font-weight: 600; 
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr;
            gap: 14px; 
        }
        .option-btn {
            padding: 16px;
            border: 2px solid #334155;
            border-radius: 14px;
            background: #334155;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: left;
            transition: background 0.2s, border-color 0.2s;
            color: #f1f5f9;
            width: 100%;
        }
        .option-btn:hover:not(:disabled) { 
            border-color: var(--primary); 
            background: #475569; 
        }
        
        /* 5) Feedback & Chance Indicators */
        .correct { background: var(--success) !important; color: white; border-color: #1e8449 !important; font-weight: bold; }
        .wrong { background: var(--danger) !important; color: white; border-color: #922b21 !important; animation: shake 0.4s; }

        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-6px); } 
            75% { transform: translateX(6px); } 
        }

        .feedback-box { 
            margin-top: 20px; 
            padding: 16px; 
            border-radius: 14px; 
            background: #0f172a; 
            border-left: 5px solid var(--primary); 
            color: #cbd5e1; 
            line-height: 1.5; 
            font-size: 1.05rem;
        }

        .btn-next {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            float: right;
            box-shadow: 0 4px 0 #6c3483;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-next:hover { background: var(--accent); }
        .btn-next:active { transform: translateY(2px); box-shadow: 0 2px 0 #6c3483; }

        .creative-pop {
            font-size: 4.5rem;
            animation: popScale 1.5s infinite alternate ease-in-out;
            margin-bottom: 15px;
        }
        @keyframes popScale {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

<div id="brand-screen">
    <div class="logo-wrapper">
        <img src="assets/logo.png" alt="Innovine Logo" onerror="this.style.opacity='0.5';">
    </div>
    <h2 style="color: #f8fafc; font-size: 1.8rem; margin-bottom: 20px; letter-spacing: 1px; font-weight: 700;">INNOVINE MATH</h2>
    <div class="loader-bar-bg">
        <div id="loader-fill" class="loader-bar-fill"></div>
    </div>
</div>

<div class="game-card hidden" id="game-card">

    <div id="instruction-screen">
        <h2 style="color: var(--primary); margin-bottom: 15px;">How to Play</h2>
        <p style="font-size: 1.1rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 25px;">
            • Read each factors and multiples question carefully.<br>
            • You have <b>2 attempts</b> to select the right path on each question.<br>
            • Missing both options activates automated corrections.
        </p>
        <button class="btn-next" style="float: none;" onclick="startQuizGame()">Start Game</button>
    </div>
    
    <div id="game-play-area" class="hidden">
        <div class="header">
            <div class="hud">
                <span>Sprint: <span id="q-num">1</span>/10</span>
                <span>Stars: ⭐ <span id="score">0</span></span>
            </div>
        </div>

        <div class="progress-container"><div id="progress-bar"></div></div>

        <div id="quiz-content">
            <div class="question-text" id="q-text"></div>
            <div class="options-grid" id="options-box"></div>
            <div id="feedback-area" class="feedback-box hidden"></div>
            <div style="height: 60px;">
                <button id="next-btn" class="btn-next hidden" onclick="handleNext()">Next Challenge ➡️</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center; padding: 20px 0;">
        <div class="creative-pop">🏆✨🏁</div>
        <h1 style="color: var(--primary); margin: 10px 0;">Race Finished!</h1>
        <p id="result-msg" style="font-size: 1.2rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 30px;"></p>
        <button class="btn-next" style="float: none;" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    const audio = {
        correct: new Audio('assets/correct.mp3'),
        wrong: new Audio('assets/wrong.mp3'),
        claps: new Audio('assets/freesound_community-claps-44774.mp3')
    };

    const questions = [
        {
            q: "Which of the following numbers is a factor of 15?",
            options: ["A) 2", "B) 4", "C) 5", "D) 6"],
            ans: 2,
            explain: "5 is a factor of 15 because 15 can be divided completely by 5 without leaving any remainder (3 * 5 = 15)."
        },
        {
            q: "Which number is a multiple of 6?",
            options: ["A) 16", "B) 18", "C) 22", "D) 26"],
            ans: 1,
            explain: "18 is a multiple of 6 because counting by sixes gives: 6, 12, 18."
        },
        {
            q: "Which of these numbers is a Prime Number?",
            options: ["A) 9", "B) 12", "C) 13", "D) 15"],
            ans: 2,
            explain: "13 is a prime number because it only has two factors: 1 and itself."
        },
        {
            q: "What is the Greatest Common Factor (GCF) of 8 and 12?",
            options: ["A) 2", "B) 4", "C) 6", "D) 8"],
            ans: 1,
            explain: "The factors of 8 are 1, 2, 4, 8 and the factors of 12 are 1, 2, 3, 4, 6, 12. The largest factor they share is 4."
        },
        {
            q: "What is the Least Common Multiple (LCM) of 3 and 4?",
            options: ["A) 7", "B) 12", "C) 24", "D) 6"],
            ans: 1,
            explain: "Multiples of 3 include 3, 6, 9, 12 and multiples of 4 include 4, 8, 12. The first common multiple they meet at is 12."
        },
        {
            q: "Which of these numbers is NOT a factor of 20?",
            options: ["A) 2", "B) 4", "C) 5", "D) 6"],
            ans: 3,
            explain: "6 is not a factor of 20 because 20 cannot be split evenly into groups of 6."
        },
        {
            q: "What is the next multiple of 7 after 21?",
            options: ["A) 24", "B) 28", "C) 35", "D) 14"],
            ans: 1,
            explain: "Counting up by multiples of 7: 7, 14, 21, 28. The next number is 28."
        },
        {
            q: "Which statement about the number 1 is true?",
            options: ["A) It is prime", "B) It is composite", "C) It is neither prime nor composite", "D) It is a multiple of every number"],
            ans: 2,
            explain: "The number 1 is unique because it is mathematically defined as neither a prime nor a composite number."
        },
        {
            q: "If a number ends in 0, it must be divisible by:",
            options: ["A) 3", "B) 4", "C) 9", "D) 10"],
            ans: 3,
            explain: "Any whole number that ends with a 0 in the ones place can always be divided evenly by 10."
        },
        {
            q: "Which number is a composite number?",
            options: ["A) 2", "B) 5", "C) 7", "D) 9"],
            ans: 3,
            explain: "9 is a composite number because it has more than two factors: 1, 3, and 9."
        }
    ];

    let currentIdx = 0, score = 0, attempts = 0;

    function randomizeQuestions() {
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
    }

    // Safe logo progress timeline handler tracking exactly 5000ms 
    window.addEventListener('DOMContentLoaded', () => {
        const fill = document.getElementById('loader-fill');
        let pct = 0;
        
        const loaderTimer = setInterval(() => {
            pct += 1;
            fill.style.width = pct + '%';
            if (pct >= 100) {
                clearInterval(loaderTimer);
                randomizeQuestions();
                document.getElementById('brand-screen').style.display = 'none';
                document.getElementById('game-card').classList.remove('hidden');
            }
        }, 50);
    });

    function startQuizGame() {
        document.getElementById('instruction-screen').classList.add('hidden');
        document.getElementById('game-play-area').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const data = questions[currentIdx];
        attempts = 0; 
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + '%';

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            box.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const data = questions[currentIdx];
        const feedback = document.getElementById('feedback-area');
        const allBtns = document.querySelectorAll('.option-btn');

        allBtns.forEach(b => b.disabled = true);

        if (idx === data.ans) {
            btn.classList.add('correct');
            try { audio.correct.play(); } catch(e){}
            if (attempts === 0) score++;
            document.getElementById('score').innerText = score;
            feedback.innerHTML = `<b>🌟 Correct!</b><br>${data.explain}`;
            feedback.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            if(currentIdx === questions.length - 1) { try { audio.claps.play(); } catch(e){} }
        } else {
            btn.classList.add('wrong');
            try { audio.wrong.play(); } catch(e){}
            attempts++;

            if (attempts < 2) {
                setTimeout(() => {
                    allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; });
                    feedback.innerHTML = `<b>Not quite right!</b> Check your math rules. 1 attempt left.`;
                    feedback.classList.remove('hidden');
                }, 400);
            } else {
                allBtns[data.ans].classList.add('correct');
                feedback.innerHTML = `<b>Out of attempts!</b> The correct choice was: <b>${data.options[data.ans]}</b>.<br>${data.explain}`;
                feedback.classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            }
        }
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-play-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = '100%';
        try { audio.claps.play(); } catch(e){}
        
        let msg = `Great race! You completed all challenges and scored ${score} out of 10 stars!`;
        if (score === questions.length) msg = "Sensational! A perfect 10/10 stars. You completely mastered factors and multiples loops!";
        
        document.getElementById('result-msg').innerText = msg;
    }
</script>

</body>
</html>
