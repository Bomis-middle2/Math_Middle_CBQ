<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Large Numbers CBQ</title>
<style>
body{font-family:Arial;background:#f4f7f6;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}
.game-card{width:90%;max-width:700px;background:#fff;padding:30px;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,0.15)}
button{padding:12px;border-radius:10px;border:0;background:#2980b9;color:#fff;cursor:pointer;margin:6px 0;width:100%}
button:hover{background:#3498db}
.correct{background:#27ae60!important;color:#fff}
.wrong{background:#c0392b!important;color:#fff}
.hidden{display:none}
</style>
</head>
<body>

<div class="game-card">
<h2>Large Numbers Quiz</h2>

<div id="question"></div>
<div id="options"></div>
<p id="explain"></p>

<button onclick="nextQ()">Next</button>
</div>

<script>

const questions = [

{
q:"A news report states that the population of a small town is 8,75,420. If 1 more person moves in, what is the new population?",
options:["8,75,421","8,75,430","8,76,420","9,75,420"],
ans:0,
explain:"Adding 1 increases ones place: 8,75,420 → 8,75,421"
},

{
q:"Look at the cost of cars. Which is cheapest?",
options:["Car A","Car B","Car C","Car D"],
ans:3,
explain:"₹8,00,500 is the smallest value"
},

// 🔥 Q3 UPDATED CBQ
{
q:"A teacher asks students to form different numbers using digits of a given number. In 5,28,394, Ayaan swaps the digit in the Ten-Thousands place with the digit in the Hundreds place. What will be the new number formed?",
options:["5,38,294","5,28,394","5,82,394","2,58,394"],
ans:0,
explain:"2 (Ten-Thousands) is swapped with 3 (Hundreds), giving 5,38,294"
},

{
q:"Write 1,200,000 in international format",
options:["12,00,000","1,200,000","120,00,00","1,2,00,000"],
ans:1,
explain:"International system groups in thousands (1,200,000)"
},

{
q:"Round 4,872 to nearest thousand",
options:["4,000","4,800","4,900","5,000"],
ans:3,
explain:"872 ≥ 500 so round up to 5,000"
},

// 🔥 Q8 UPDATED CBQ
{
q:"While writing a cheque in the bank, Rahul wrote '7,40,000' for 'Seven lakh four thousand'. What mistake did he make?",
options:[
"He wrote seventy thousand instead of four thousand",
"He wrote forty thousand instead of four thousand",
"He wrote seven million instead of seven lakh",
"He forgot to add the zero at the end"
],
ans:1,
explain:"Correct number is 7,04,000 but Rahul wrote 7,40,000 (4 shifted to ten-thousands place)"
},

{
q:"9,99,999 + 1 = ?",
options:["9,99,998","10,00,000","1,00,000","1,00,00,000"],
ans:1,
explain:"Successor of 9,99,999 is 10,00,000"
}

];

let i=0;

function load(){
let q=questions[i];
document.getElementById("question").innerHTML=q.q;

let opt="";
q.options.forEach((o,index)=>{
opt+=`<button onclick="check(${index},this)">${o}</button>`;
});

document.getElementById("options").innerHTML=opt;
document.getElementById("explain").innerHTML="";
}

function check(ans,btn){
let q=questions[i];

if(ans==q.ans){
btn.classList.add("correct");
document.getElementById("explain").innerHTML="✔ "+q.explain;
}else{
btn.classList.add("wrong");
document.getElementById("explain").innerHTML="❌ Try again conceptually";
}
}

function nextQ(){
i++;
if(i<questions.length){
load();
}else{
document.getElementById("question").innerHTML="Completed!";
document.getElementById("options").innerHTML="";
}
}

load();

</script>

</body>
</html>
